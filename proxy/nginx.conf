# The proxy: TLS termination, and the only service published to the host.
#
# Implements: AC4 (a `proxy` service terminates TLS in front of `web` and `api`),
# NFR-06 (credentials and tokens travel over TLS in any deployed environment).
#
# There is deliberately NO `listen 80` server here, and compose publishes no plaintext
# port. An http listener that redirects to https still accepts the first request in the
# clear — and the first request is the one carrying the Authorization header when a
# client retries against a remembered URL. Refusing plaintext entirely is stronger than
# redirecting it, and this project has no legacy clients to accommodate.

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/leaveflow.crt;
    ssl_certificate_key /etc/nginx/certs/leaveflow.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # The API. `proxy_pass` carries no trailing slash and no `rewrite`, so the
    # `/api/v1` prefix reaches the backend intact — FastAPI already serves under it.
    # Adding a rewrite here would make the dev proxy and this proxy disagree about the
    # path, and every URL in api-contracts would be right in exactly one of them.
    location /api/v1 {
        proxy_pass http://api:8000;

        # Story 4.1 (FR-13): a supporting document may be up to 5 MB. nginx's default
        # client_max_body_size is 1m, which would 413 every legal upload HERE — outside
        # the error envelope, with every backend test green. 6m leaves margin over the
        # 5 MB application limit for the multipart framing; the backend remains the
        # authoritative size gate (FILE_TOO_LARGE).
        client_max_body_size 6m;

        # $http_host, not $host: $host strips the port, so a server-generated
        # redirect would send the client from :8443 to :443 — a port nothing
        # listens on locally. $http_host preserves what the client actually used.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # The api service speaks plaintext http on the internal network. Without this
        # header it would generate `http://` URLs for a client that arrived over TLS.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the React bundle, served by `web`, which owns the SPA fallback.
    location / {
        proxy_pass http://web:80;

        # $http_host, not $host: $host strips the port, so a server-generated
        # redirect would send the client from :8443 to :443 — a port nothing
        # listens on locally. $http_host preserves what the client actually used.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
