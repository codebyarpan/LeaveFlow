rigger, where it must be a provable NO-OP. [3] ⚠️ THE ONE THE FIRST DRAFT MISSED, caught by the validation pass: **PRESERVE CANNOT PRESERVE A carry_forward_cap.** entitlement_basis freezes the annual entitlement; NOTHING freezes the cap — recompute_carry_forward and run_rollover both re-read leave_type.carry_forward_cap LIVE, with no forward check. So "PRESERVE + lower the cap, write nothing" plants a DELAYED raw 500 that detonates weeks later in an UNRELATED Manager's reject (and aborts the whole rollover batch). Resolution: a cap/carries_forward change runs the forward-checked recomputation under BOTH dispositions — which makes AC6 literally true (it carries no disposition qualifier) and is the only reading under which PRESERVE is not a promise the system cannot keep. [4] start the walk at the LOWEST materialized year (carried_forward there is provably 0), never date.today().year — the third story to face that trap. [5] AC5: predicted, never caught (no try/except IntegrityError|ValueError, no SAVEPOINT). [6] zero audit rows — SM-4 pins 14; no SUBJECT_POLICY_CHANGE and there must not be one. [7] no 9th balance method; [tool.importlinter] untouched. [8] four build guards incl. TWO NEW: main.py CODE_TO_STATUS (2.11 pointedly did not touch main.py; this story must) and the scope-matrix registration. [9] test_vocabulary_literals makes Literal["RECALCULATE","PRESERVE"] IMPOSSIBLE to write anywhere under app/ — type the field str|None and validate in the service (the PATCH /me precedent), which also turns an INVALID disposition from a bare 422 / raw CHECK 500 into a clean 400. 12 Open Decisions; #1 is the genuinely under-determined one (what PRESERVE means for a cap change) and #11 carries 2.11's UNFIXED Open Decision #8 forward — the AD-6 submit gap is the last story of Epic 2's to force a call on, or it ships.)
