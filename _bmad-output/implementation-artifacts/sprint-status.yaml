# story 3-4 created: backlog -> ready-for-dev (epic-3 already in-progress). THE `notification` TABLE + FR-14/AD-16. Backend: 0012 migration (notification: recipient_employee_id/leave_request_id/kind/read_at/created_at) + the codebase's FIRST PARTIAL INDEX + repositories/services/api trio + 3 endpoints; hooks into the EXISTING submit and decide transactions. FIVE THINGS INVERT THE APP'S HABITS, and each is a landmine: [1] api-contracts §4.8 grants all three endpoints to Role `any` / Scope `self` — so NO require_role (use get_current_employee), and a non-addressee PATCH is 404 NOT 403 (the G3 settlement: the role gate always admits -> the scope predicate runs -> a miss is 404). 3.2 and 3.3 each shipped a Manager-ONLY inversion, so the muscle memory is exactly backwards. Consequently the frontend badge has NO ROLE GATE either: AC7's "an Employee is authenticated" means any authenticated person, and a MANAGER is the primary recipient (REQUEST_SUBMITTED is addressed to them) — gating on role==='EMPLOYEE' would hide the very notification FR-14 exists to deliver. [2] `_decide` is SHARED by approve, reject AND cancel — an unconditional insert fires on self-cancellation, which no AC grants and the kind CHECK does not admit; use a keyword-only `notify_kind: str|None = None` opt-in, the exact shape of 2.10's `recompute_carry_forward: bool = False`. And the recipient on decide is row.employee_id (the APPLICANT), never actor.id (the Manager). Submit's TWO branches differ: managed -> REQUEST_SUBMITTED to actor.manager_id; MANAGERLESS -> REQUEST_APPROVED to the applicant THEMSELVES and ZERO REQUEST_SUBMITTED (AC4) — the naive unconditional insert violates a NOT NULL FK there and raw-500s. [3] `notification` is the FIRST NON-APPEND-ONLY table since 0008: read_at is mutable, so the grant is `GRANT SELECT, INSERT, UPDATE` — but 0009/0010/0011 ALL created append-only tables and ALL wrote `GRANT INSERT, SELECT`, so the nearest template is the wrong one and copying it makes PATCH .../read fail at RUNTIME with InsufficientPrivilege while unit tests stay green. DELETE deliberately withheld (teardown runs as owner_engine). [4] ⚠️ VERIFIED AGAINST THE INSTALLED PACKAGES: alembic 1.18.5 contains ZERO references to `postgresql_where` (its PG _dialect_options compares only nulls_not_distinct), so `alembic check` — and therefore test_model_migration_agreement — CANNOT SEE that the index is partial. A plain non-partial index passes every guard while silently failing AC1. The partial-ness must be pinned by asserting pg_indexes.indexdef contains `read_at IS NULL`; a name-only assertion (the test_migration_smoke precedent) is NOT sufficient. [5] PATCH /notifications/{id}/read HAS a path param -> test_scope_matrix FAILS unless registered as {Scope.SELF}; the two GETs have none and must NOT be registered. This makes 3.4 the FIRST Epic-3 story to legitimately edit a guard file (3.1/3.2/3.3 all shipped zero). Mark-read is idempotent and is NOT AD-4's rowcount==0 => 409: locate under scope first (None -> 404), then the guarded UPDATE, and rowcount==0 means ALREADY READ => 200. SM-4 stays exactly 14 (a notification is not a state transition; zero new insert_audit_entry call sites — and unlike rollover/recalculation this story CANNOT prove it by not importing audit_entry_repo, since it writes inside the two functions that already call it). kind enum is EXACTLY 3 values: services/cancellation writes ZERO notifications (readiness F-4, settled; the review-adversarial proposal for CANCELLATION_* kinds was REJECTED and must not be built from). No new error code -> main.py UNTOUCHED. Baseline MEASURED at 537; expected delta = new tests + 3 (test_vocabulary_literals is one case per new app/ .py) + 1 (test_migrations_insert_nothing is parametrized per migration file). ⚠️ THE AD-6 FORCING POINT COMES DUE: 2.11 #8 -> 2.12 #11 -> 3.1 #6 -> 3.2 #4 -> 3.3 #7 all deferred it explicitly to 3.4 ("it now ships unless Epic 3 picks it up"; 3.5 is read-only). Open Decision #1 rules on it AND CORRECTS IT: deferred-work's prescribed "one more recompute_carry_forward call in submit_leave_request" is UNSAFE AS WRITTEN — the three existing call sites are all where available(Y) RISES, submit LOWERS it, and recompute_carry_forward (rollover.py:214/:265-316) has NO forward check while set_accrual (balances.py:328-333) raises a BARE ValueError with no handler => a NEW RAW 500 on the submit path. Recommended: adopt the FORWARD-CHECKED fix (reuse the pure domain/recalculation.project_forward, skip-and-flag into admin_review_flag with a new CAUSE_* — never refuse the submission, for which no error code exists), which also kills 2.12's shipped defect (deferred-work:74) since both share one root cause: an unguarded recompute. Task 11, LAST and separable; if it cannot be done safely, DECLARE IT NOT DONE rather than ship the one-liner. Fresh-context validation pass: 3 CRITICAL found and FIXED IN-FILE — [C1] creating the table turns EIGHT existing integration modules RED (notification FK-references leave_request/employee; their teardowns bulk-delete those parents -> ForeignKeyViolation -> whole module errors), and BOTH instinctive fixes are forbidden by the story (grant DELETE / ON DELETE CASCADE) -> new Task 8b + Landmine 16 mandate delete(Notification) ahead of the parents, where delete(AuditEntry) already sits; [C2] test-count arithmetic was +3, is +4; [C3] Task 4 needed a scoped get_notification Task 3 never specced. Plus 3 enhancements and 5 citation fixes. ZERO fabricated technical claims found.
