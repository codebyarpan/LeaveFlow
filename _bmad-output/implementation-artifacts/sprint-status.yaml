rendered as the literal word never a name/blank, no new CSS, AD-2 scan clean. Backend pytest 405 passed (from 390, 0 skipped); import-linter 7/7 kept; frontend build+lint clean; migration up/down/up verified idempotent; seed exit 0. OPERATOR: add APP_DB_USER/APP_DB_PASSWORD to .env (in .env.example) and `docker compose up -d --force-recreate api`. Open: no occurred_at index (ERD names none) on the table that will grow largest; page-1-only still app-wide.
