# story 2-10 created 2026-07-14: backlog -> ready-for-dev (FR-07 comes due. FIRST story with NO HTTP surface at all — no endpoint, no router change, no React screen, no new error code, no scope-matrix row; readiness report L554 blesses this explicitly ["2.10 is the rollover CLI and correctly has none"]. Adds: 0009 migration creating rollover_run [id/leave_year/occurred_at, NO UNIQUE(leave_year) — the log records executions, idempotence is a property of the BALANCES not the log] + its OWN `GRANT INSERT, SELECT` [0008 left an in-code note refusing ALTER DEFAULT PRIVILEGES *naming this story*, so nothing is inherited]; domain/carry_forward.py [pure, DB-free, takes carries_forward+cap and NEVER a leave-type code so AC4 is unfalsifiable]; services/rollover.py [run_rollover(Y) closes Y and materializes Y+1 via set_accrual, one txn, one rollover_run row, ZERO audit rows]; app/jobs/rollover.py [argparse CLI over the existing app/jobs/ package, --year required so no clock is ever mocked]. THE HARD PART IS NOT THE JOB: AC6/DR-7a is a RETRO-FIT into 2.7 and 2.8 — the three sites where available(Y) rises [reject + self-cancel via _decide's release_reserved, and approve-CR's release_consumed] must recompute carried_forward(Y+1) and propagate forward, while APPROVE must NOT [consume_reserved leaves available unchanged; a recompute there makes clawback-safety an accident of arithmetic]. FIVE LANDMINES: [1] the non-deferrable CHECK(accrued = prorated + carried) forbids writing carried_forward alone -> set_accrual only, and the 8-method AD-17 surface is frozen by a test; [2] set_accrual's DO-UPDATE branch has NO available>=0 guard — 2.4 deferred it as "not reachable", and THIS STORY IS THE FIRST CALLER TO REACH IT; the guard is now mandatory, and the obvious implementation [_lock()] is a trap because it raises LookupError on the fresh-insert path and would break all three create hooks; [3] 0009 must issue INSERT,SELECT and NOT copy 0008's read-write loop — copying it destroys NFR-09 silently with every test still green; [4] the rollover must write ZERO audit_entry rows or SM-4's exact-count ledger [14 rows] and the decide count [2] both break; [5] do NOT touch [tool.importlinter] — contract 7 already covers app.jobs and test_architecture pins all 7 byte-for-byte. Validation pass caught 5 criticals since fixed in-file, incl. _current_leave_year() sitting 250 lines from the hook site [would break AC6 in AC6's own scenario] and a hardcoded test year that would silently pass against zeroes after 1 Jan. Also HEALS a live 2.4-deferred bug: the year-rollover cliff [reads go empty and mutations 500 once the calendar year turns]. 6 Open Decisions recorded, incl. the ONE genuinely under-determined point in the spec: a NULL carry_forward_cap on a CARRYING type -> recommended "uncapped")
