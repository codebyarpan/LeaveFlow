# The `web` service: serves the built React bundle. Reached only through `proxy` (AC4).
#
# Implements: AC1 (the static React bundle is served), AC8.
#
# Plain HTTP on the internal network, and not published to the host. TLS is terminated
# once, at the proxy (NFR-06).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted assets. Vite hashes the filename, so the content at a given URL can
    # never change, and a year-long immutable cache is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The SPA fallback. A client that reloads on /leave-requests/42 asks nginx for a file
    # that does not exist; without this, they get a 404 instead of the application, and
    # every deep link in the product is broken.
    #
    # `index.html` itself must never be cached, or a returning browser will keep asking
    # for the previous build's fingerprinted assets, which the new deploy has deleted.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
